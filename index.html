<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiffany Ngan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #fdf6f8;
      --white:    #ffffff;
      --blush:    #f7dde5;
      --rose:     #d4849a;
      --deep:     #b5607a;
      --text:     #2e1f26;
      --muted:    #b89aa3;
      --border:   #f0d4db;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── Fade in ── */
    .fi {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .fi.in { opacity: 1; transform: none; }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(253, 246, 248, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    /* ── Hero ── */
    #hero {
      min-height: calc(100vh - 54px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      text-align: center;
    }

    .hero-paw {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      display: block;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 10vw, 6.5rem);
      line-height: 1.0;
      color: var(--text);
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }

    .hero-name em {
      font-style: italic;
      color: var(--rose);
    }

    .hero-tag {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .hero-tag span {
      color: var(--rose);
      font-style: normal;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 32px;
      background: var(--border);
      animation: drop 1.6s ease-in-out infinite;
    }

    @keyframes drop {
      0%   { transform: scaleY(0); transform-origin: top; }
      50%  { transform: scaleY(1); transform-origin: top; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    /* ── Gallery ── */
    #gallery {
      padding: 5rem 2rem 6rem;
    }

    .gallery-inner {
      max-width: 540px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .section-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    /* Carousel */
    .carousel-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: var(--blush);
      box-shadow: 0 8px 48px rgba(180, 96, 122, 0.1);
      aspect-ratio: 1 / 1;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-track img {
      min-width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(6px);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 2;
    }

    .carousel-btn:hover { background: rgba(255,255,255,0.95); transform: translateY(-50%) scale(1.05); }
    .carousel-btn.prev { left: 14px; }
    .carousel-btn.next { right: 14px; }

    .carousel-btn svg {
      width: 13px;
      height: 13px;
      stroke: var(--deep);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 1.2rem;
    }

    .carousel-dots button {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      border: none;
      background: var(--border);
      cursor: pointer;
      padding: 0;
      transition: background 0.25s, transform 0.25s;
    }

    .carousel-dots button.active {
      background: var(--rose);
      transform: scale(1.4);
    }

    /* ── Note ── */
    #note {
      padding: 0 2rem 7rem;
    }

    .note-card {
      max-width: 480px;
      margin: 0 auto;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.8rem 3rem;
      text-align: center;
      box-shadow: 0 4px 32px rgba(180, 96, 122, 0.07);
    }

    .note-glyph {
      font-size: 1.6rem;
      margin-bottom: 1.2rem;
      display: block;
    }

    .note-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      line-height: 1.85;
      color: #7a4f5c;
    }

    .note-sig {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      padding: 2rem;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    footer p {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #hero { padding: 4rem 1.5rem; }
      #gallery, #note { padding-left: 1.5rem; padding-right: 1.5rem; }
      .note-card { padding: 2rem 1.75rem; }
    }
  </style>
</head>
<body>

  <!-- ── Nav ── -->
  <nav>
    <a href="#" class="nav-name">Tiffany Ngan</a>
  </nav>

  <!-- ── Hero ── -->
  <section id="hero" style="position:relative;">
    <span class="hero-paw fi">🐾</span>
    <h1 class="hero-name fi" style="transition-delay:0.1s;">
      Tiffany<br><em>Ngan</em>
    </h1>
    <p class="hero-tag fi" style="transition-delay:0.2s;">
      香港 &nbsp;·&nbsp; cat person
    </p>
    <div class="scroll-hint fi" style="transition-delay:0.4s;">scroll</div>
  </section>

  <!-- ── Gallery ── -->
  <section id="gallery">
    <div class="gallery-inner">
      <p class="section-label fi">the gallery</p>
      <h2 class="section-title fi">cute cats only.</h2>
      <p class="section-sub fi">a very curated, very important collection.</p>

      <div class="carousel-wrap fi" style="transition-delay:0.1s;">
        <div class="carousel-track" id="track">
          <img src="images/angycat.png"        alt="angy cat"         style="object-position: center center;">
          <img src="images/white-cat.png"       alt="white cat"        style="object-position: center center;">
          <img src="images/princesscat.png"     alt="princess cat"     style="object-position: center 30%;">
          <img src="images/pinksweatercat.png"  alt="pink sweater cat" style="object-position: center 38%;">
          <img src="images/hatcat.png"          alt="hat cat"          style="object-position: center 38%;">
          <img src="images/kingcat.png"         alt="king cat"         style="object-position: center 38%;">
          <img src="images/carcat.png"          alt="car cat"          style="object-position: center 42%;">
          <img src="images/smollcat.png"        alt="smol cat"         style="object-position: center 38%;">
          <img src="images/cat-2.png"           alt="baby cat"         style="object-position: center center;">
          <img src="images/sleeping-princess-cat.png" alt="sleeping cat" style="object-position: center center;">
        </div>
        <button class="carousel-btn prev" id="prev" aria-label="Previous">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="carousel-btn next" id="next" aria-label="Next">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="carousel-dots" id="dots"></div>
    </div>
  </section>

  <!-- ── Note ── -->
  <section id="note">
    <div class="note-card fi">
      <span class="note-glyph">🐱</span>
      <p class="note-text">
        wouldn't it be nice to be a cat —<br>
        soft life, no worries,<br>
        just sleeping in warm places<br>
        and being loved.
      </p>
      <p class="note-sig">— tiffany ngan, probably</p>
    </div>
  </section>

  <!-- ── Footer ── -->
  <footer>
    <p>tiffanyngan.com &nbsp;·&nbsp; made with ♡</p>
  </footer>

  <script>
    // Fade-in observer
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
      }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.fi').forEach(el => obs.observe(el));

    // Carousel
    const track  = document.getElementById('track');
    const dotsEl = document.getElementById('dots');
    const imgs   = track.querySelectorAll('img');
    let current  = 0;

    imgs.forEach((_, i) => {
      const d = document.createElement('button');
      if (i === 0) d.classList.add('active');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    function goTo(n) {
      current = (n + imgs.length) % imgs.length;
      track.style.transform = `translateX(-${current * 100}%)`;
      dotsEl.querySelectorAll('button').forEach((d, i) => d.classList.toggle('active', i === current));
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));

    // Swipe
    let sx = 0;
    track.addEventListener('pointerdown', e => { sx = e.clientX; });
    track.addEventListener('pointerup',   e => { const d = sx - e.clientX; if (Math.abs(d) > 40) goTo(current + (d > 0 ? 1 : -1)); });

    // Auto-advance
    let timer = setInterval(() => goTo(current + 1), 3800);
    const wrap = track.closest('.carousel-wrap');
    wrap.addEventListener('mouseenter', () => clearInterval(timer));
    wrap.addEventListener('mouseleave', () => { timer = setInterval(() => goTo(current + 1), 3800); });
  </script>

</body>
</html>
